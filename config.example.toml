# Copy to config.toml and replace every example ID/path.
archive_dir = "./archive"
instance_lock_dir = "./pam-instance.lock"
allowed_user_ids = [123456789012345678]
max_attachment_mb = 25
max_audio_seconds = 1800
whisper_model = "small.en"
whisper_device = "cpu"
whisper_compute_type = "int8"
codex_binary = "codex"
codex_timeout_seconds = 1800

[guilds."234567890123456789"]
workspace = "/absolute/path/to/agent-native-genomics"
run_codex = true
instruction_prefix = "Follow this project's instructions. Treat this as formal project work."
project_record_dir = ".pam/conversations"

# Optional: override one channel to use a project subdirectory.
[channels."345678901234567890"]
workspace = "/absolute/path/to/agent-native-genomics/papers"
run_codex = true
instruction_prefix = "Work in the papers area of this project."
project_record_dir = ".pam/conversations"
